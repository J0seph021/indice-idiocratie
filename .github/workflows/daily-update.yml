name: Mise à jour quotidienne de l'Idiocratie

# Routine : tous les jours à 11:00 UTC (07:00 heure de Montréal)
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}   # bouton "Run workflow" manuel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Recalculer les scores de connerie
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/update.mjs

      - name: Commit des nouvelles conneries
        run: |
          git config user.name "Idiocracy Bot"
          git config user.email "bot@idiocratie.local"
          git add data/scores.json
          git diff --staged --quiet || git commit -m "🧠 Conneries du $(date -u +%Y-%m-%d)"
          git push
