name: Mise a jour quotidienne de l'Idiocratie

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      baseline:
        description: "Recalibrer le point de depart de chaque pays (calibration unique)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installer les dependances (resvg, opentype) pour l'image sociale
        run: npm install --no-audit --no-fund
      - name: Recalculer les scores
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASELINE: ${{ (inputs.baseline == true) && '1' || '0' }}
        run: node scripts/update.mjs
      - name: Commit
        run: |
          git config user.name "Idiocracy Bot"
          git config user.email "bot@idiocratie.local"
          git add data/scores.json assets/og.png assets/og c
          git diff --staged --quiet || git commit -m "Conneries du jour"
          git push
      - name: Publier sur Facebook, X et Instagram
        continue-on-error: true
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/post-social.mjs
