name: Mise a jour quotidienne de l'Idiocratie

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installer les dependances (resvg, opentype) pour l'image sociale
        run: npm install --no-audit --no-fund
      - name: Recalculer les scores
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update.mjs
      - name: Commit
        run: |
          git config user.name "Idiocracy Bot"
          git config user.email "bot@idiocratie.local"
          git add data/scores.json assets/og.png assets/og c
          git diff --staged --quiet || git commit -m "Conneries du jour"
          git push
      - name: Publier sur Facebook / Instagram (si les secrets sont configures)
        continue-on-error: true
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          POST_ANGLE: spotlight
          POST_LANG: en
        run: node scripts/publish-social.mjs
      - name: Publier sur X / Twitter (si les secrets sont configures)
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          POST_ANGLE: spotlight
          POST_LANG: en
        run: node scripts/publish-x.mjs
      - name: Brouillons de posts (artifact prive, non publie sur le site)
        uses: actions/upload-artifact@v4
        with:
          name: social-posts
          path: marketing/social/
          if-no-files-found: ignore
